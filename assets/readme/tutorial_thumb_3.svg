<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#2d1a0d"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg3)" rx="6"/>
  <rect width="318" height="178" x="1" y="1" fill="none" stroke="#30363d" stroke-width="1" rx="6"/>

  <!-- Rocket icon (decorative) -->
  <line x1="80" y1="80" x2="130" y2="40" stroke="#f44336" stroke-width="2" opacity="0.6"/>
  <circle cx="80" cy="80" r="5" fill="#f44336" opacity="0.7"/>

  <!-- Glider dot -->
  <circle cx="200" cy="55" r="7" fill="#00e5ff" opacity="0.8"/>

  <!-- Play button -->
  <circle cx="160" cy="88" r="28" fill="#f44336" opacity="0.9"/>
  <polygon points="152,76 152,100 178,88" fill="#ffffff"/>

  <!-- Tutorial number badge -->
  <rect x="10" y="10" width="26" height="18" rx="3" fill="#f44336"/>
  <text x="23" y="23" fill="#ffffff" font-family="monospace,Courier New" font-size="11" font-weight="bold" text-anchor="middle">3</text>

  <!-- Title -->
  <text x="160" y="132" fill="#e6edf3" font-family="monospace,Courier New" font-size="13" font-weight="bold" text-anchor="middle">Advanced Tactics &amp;</text>
  <text x="160" y="149" fill="#e6edf3" font-family="monospace,Courier New" font-size="13" font-weight="bold" text-anchor="middle">High Score Runs</text>

  <!-- Duration -->
  <text x="305" y="20" fill="#8b949e" font-family="monospace,Courier New" font-size="10" text-anchor="end">~10 min</text>

  <!-- Coming soon ribbon -->
  <rect x="0" y="155" width="320" height="25" rx="0" fill="#21262d" opacity="0.9"/>
  <text x="160" y="172" fill="#3fb950" font-family="monospace,Courier New" font-size="11" text-anchor="middle" letter-spacing="2">RECORDING IN PROGRESS</text>
</svg>
